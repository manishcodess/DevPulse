ted by their IoT devices and make better decisions with our edge analytics solutions, designed for smart city applications and IoT systems. Natural Language Processing We can help businesses and organisations to extract insights from unstructured data such as texts, and improve their customer service, chatbots, and language translation services. Computer Vision We can help businesses and organisations to extract insights from images and videos, and improve their performance in fields such as facial recognition, object recognition and image classification. Machine Learning We can help businesses and organisations to extract insights from data and improve their performance in fields such as prediction, classification, clustering and anomaly detection. Customised AI Solutions We can help businesses and organisations to develop customised AI solutions that are tailored to their specific requirements.\u003c/span\u003e\u003c/p\u003e\u003cdl class=\"overflow-hidden\"\u003e\u003cdt class=\"mb1\"\u003e\u003c/dt\u003e\u003c/dl\u003e"])</script><script>self.__next_f.push([1,"16:T354d,"])</script><script>self.__next_f.push([1,"\u003cp data-start=\"103\" data-end=\"128\"\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cspan style=\"text-decoration: underline;\" data-mce-style=\"text-decoration: underline;\"\u003e\u003cstrong data-start=\"103\" data-end=\"128\"\u003ePlease Note:\u003c/strong\u003e\u003c/span\u003e\u003cstrong data-start=\"103\" data-end=\"128\"\u003e-\u0026nbsp;\u003c/strong\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-family: verdana, geneva, sans-serif;\" data-mce-style=\"font-family: verdana, geneva, sans-serif;\"\u003eOnly candidates from Gurugran or nearby locations are eligible.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspa n: underline;\" data-mce-style=\"text-decoration: underline;\"\u003e\u003cstrong\u003eKey Responsibilities\u003c/strong\u003e\u003c/span\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cstrong\u003eBackend Development:\u003c/strong\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eAssist in developing and maintaining server-side applications and APIs using technologies such as Node.js, Python, or Java.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eHelp implement RESTful APIs to enable smooth communication between system components.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eWork with databases (SQL/NoSQL MySQL, PostgreSQL, MongoDB) to store and process data efficiently.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eLearn and contribute to improving application performance, security, and scalability.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cstrong\u003eFrontend Development:\u003c/strong\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eHelp build responsive, user-friendly interfaces using HTML, CSS, JavaScript, and frameworks like Next.js, React, Angular, or Vue.js.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eContribute to the creation of data visualizations using libraries such as D3.js, Chart.js, or Plotly.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eCollaborate with designers to support intuitive UI/UX designs.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cstrong\u003eFull Stack Integration:\u003c/strong\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eWork on integrating frontend and backend components to create a seamless user experience.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eAssist in debugging and resolving issues across the full technology stack.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eLearn about security best practices including authentication, authorization, and input validation.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eGain experience using Git for version control and CI/CD pipelines for automated deployments.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cspan style=\"text-decoration: underline;\" data-mce-style=\"text-decoration: underline;\"\u003e\u003cstrong\u003eAdditional Responsibilities:\u003c/strong\u003e\u003c/span\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eParticipate in code reviews and team discussions to enhance your learning and contribute to team improvements.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eDocument technical specifications, APIs, and development processes as part of the project workflow.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cspan style=\"text-decoration: underline;\" data-mce-style=\"text-decoration: underline;\"\u003e\u003cstrong\u003eSkills \u0026amp; Qualifications\u003c/strong\u003e\u003c/span\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cstrong\u003eRequired Qualifications:\u003c/strong\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eCurrently pursuing or recently completed a Bachelors degree in Computer Science, Software Engineering, or a related field.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eBasic knowledge of frontend technologies (HTML, CSS, JavaScript) and frameworks (React, Angular, or Vue.js).\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eFundamental understanding of backend technologies (Node.js, Python, or Java).\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eFamiliarity with databases (SQL/NoSQL MySQL, MongoDB, PostgreSQL).\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eBasic knowledge of RESTful API development and integration.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eStrong problem-solving skills and attention to detail.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eA willingness to learn, collaborate, and contribute in a team setting.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cspan style=\"text-decoration: underline; font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"text-decoration: underline; font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cstrong\u003ePreferred Qualifications:\u003c/strong\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eExperience with Git and version control systems.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eAn interest in cloud services (AWS, Azure, Google Cloud).\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eFamiliarity with Docker and Kubernetes is a plus.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eExposure to data visualization libraries.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eLearning Opportunities\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eReal-World Experience:\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eWork on genuine full stack development projects that solve real problems.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cstrong\u003eMentorship\u003c/strong\u003e\u003c/em\u003e:\u003c/span\u003e\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eGain guidance from experienced developers and tech leads.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cstrong\u003eSkill Development:\u003c/strong\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eLearn modern development tools, frameworks, and best practices.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cstrong\u003e\u003cem\u003eCareer Growth:\u003c/em\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003ePossibility of transitioning into a full-time role upon successful completion of the internship.\u003c/span\u003e\u003cbr\u003e\u003c/li\u003e\u003c/ul\u003e"])</script><script>self.__next_f.push([1,"17:T856,"])</script><script>self.__next_f.push([1,"\u003cp class=\"break-words white-space-pre-wrap t-black--light text-body-medium\"\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eAt AAIZEL Technologies, we are experts in the field of geospatial technologies, weather analytics and edge analytics. Our team of experts has a wealth of experience in these fields, and we are constantly seeking out new and exciting ways to apply our knowledge and skills to help our clients achieve their goals. Geospatial Technologies Our team of experts can help businesses and organisations make better decisions by visualising and analysing spatial data. We have experience in providing solutions in industries such as agriculture, energy and urban planning. Weather Analytics We have developed an AI-powered weather prediction system that can provide accurate and real-time forecasts, which can be used for a wide range of applications such as weather-sensitive industries and emergency management. Edge Analytics We can help businesses and organisations to gain insights from the data generated by their IoT devices and make better decisions with our edge analytics solutions, designed for smart city applications and IoT systems. Natural Language Processing We can help businesses and organisations to extract insights from unstructured data such as texts, and improve their customer service, chatbots, and language translation services. Computer Vision We can help businesses and organisations to extract insights from images and videos, and improve their performance in fields such as facial recognition, object recognition and image classification. Machine Learning We can help businesses and organisations to extract insights from data and improve their performance in fields such as prediction, classification, clustering and anomaly detection. Customised AI Solutions We can help businesses and organisations to develop customised AI solutions that are tailored to their specific requirements.\u003c/span\u003e\u003c/p\u003e\u003cdl class=\"overflow-hidden\"\u003e\u003cdt class=\"mb1\"\u003e\u003c/dt\u003e\u003c/dl\u003e"])</script><script>self.__next_f.push([1,"18:T2c4a,"])</script><script>self.__next_f.push([1,"\u003cp data-start=\"103\" data-end=\"128\"\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cspan style=\"text-decoration: underline;\" data-mce-style=\"text-decoration: underline;\"\u003e\u003cstrong data-start=\"103\" data-end=\"128\"\u003ePlease Note:\u003c/strong\u003e\u003c/span\u003e\u003cstrong data-start=\"103\" data-end=\"128\"\u003e-\u0026nbsp;\u003c/strong\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-family: verdana, geneva, sans-serif;\" data-mce-style=\"font-family: verdana, geneva, sans-serif;\"\u003eOnly candidates from Gurugran or nearby locations are eligible.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-family: verdana, geneva, sans-serif;\" data-mce-style=\"font-family: verdana, geneva, sans-serif;\"\u003eBatch: 2025 or 2026.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cstrong\u003e\u003cem\u003e\u003cspan style=\"text-decoration: underline;\" data-mce-style=\"text-decoration: underline;\"\u003eKey Responsibilities:\u003c/span\u003e\u003c/em\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\u003col\u003e\u003cli\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cstrong\u003eModel Development and Optimization:\u003c/strong\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003c/li\u003e\u003c/ol\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eDesign, implement, and deploy ML models for diverse applications, including predictive analytics, anomaly detection, and computer vision, tailored for cybersecurity, climate monitoring, and geospatial data analysis.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eUtilize deep learning (CNNs, RNNs), reinforcement learning, and generative models (GANs) for complex problem-solving.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003col start=\"2\"\u003e\u003cli\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cstrong\u003eAdvanced Data Engineering:\u003c/strong\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003c/li\u003e\u003c/ol\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eDevelop ETL pipelines and preprocessing scripts using Pandas, NumPy, and PySpark to handle large datasets from satellite imagery, IoT sensors, and real-time data sources.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eIntegrate data from APIs, databases, and big data platforms (Hadoop, Apache Kafka) to support real-time analytics.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003col start=\"3\"\u003e\u003cli\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cstrong\u003eAlgorithm Research and Development:\u003c/strong\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003c/li\u003e\u003c/ol\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eResearch state-of-the-art ML techniques, including Transfer Learning, Transformer models, and AutoML, to enhance model performance.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eInnovate new algorithms for geospatial analysis, such as object detection on aerial imagery, spatial clustering, and environmental modeling.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003col start=\"4\"\u003e\u003cli\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cstrong\u003eDeployment and MLOps:\u003c/strong\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003c/li\u003e\u003c/ol\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eDeploy models using Docker, Kubernetes, and CI/CD pipelines, ensuring robust model lifecycle management.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eWork with cloud platforms (AWS, Azure, GCP) to implement scalable model serving solutions, using technologies like SageMaker, TensorFlow Serving, and ONNX.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003col start=\"5\"\u003e\u003cli\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cstrong\u003ePerformance Evaluation and Tuning:\u003c/strong\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003c/li\u003e\u003c/ol\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003ePerform model evaluation using advanced metrics (F1 Score, AUC-ROC, Intersection over Union for spatial data) and optimize for both accuracy and inference speed.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eImplement hyperparameter tuning using Bayesian Optimization, Grid Search, and Neural Architecture Search.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003col start=\"6\"\u003e\u003cli\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cstrong\u003eCollaboration and Code Quality:\u003c/strong\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003c/li\u003e\u003c/ol\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eCollaborate with data engineers, cybersecurity experts, and geospatial analysts to integrate ML solutions into end-to-end products.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eAdhere to coding standards, participate in code reviews, and maintain high-quality codebases using Git, Jira, and Confluence.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003col start=\"7\"\u003e\u003cli\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cstrong\u003eMonitoring and Maintenance:\u003c/strong\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003c/li\u003e\u003c/ol\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eDevelop monitoring dashboards using Grafana, Prometheus, or similar tools to track model performance post-deployment.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eImplement feedback loops for model retraining based on real-time data and evolving application needs.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cspan style=\"text-decoration: underline;\" data-mce-style=\"text-decoration: underline;\"\u003e\u003cstrong\u003eRequired Skills, Qualifications, and Experience:\u003c/strong\u003e\u003c/span\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cstrong\u003eEducational Background:\u003c/strong\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eBachelors/Masters degree in Computer Science, Data Science, Machine Learning, or a related field, preferably from top-tier institutions.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cstrong\u003eTechnical Proficiency:\u003c/strong\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eStrong skills in Python, PyTorch, TensorFlow, and Scikit-learn.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eProficiency in SQL, NoSQL databases (MongoDB, Cassandra), and data warehousing solutions (Redshift, BigQuery).\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cstrong\u003eProblem-Solving:\u003c/strong\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eAnalytical mindset with the ability to solve complex problems using data-driven approaches.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cstrong\u003eCommunication:\u003c/strong\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eCapable of translating technical details into actionable insights for diverse stakeholders.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cstrong\u003eAdaptability\u003c/strong\u003e\u003c/em\u003e:\u003c/span\u003e\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eAbility to thrive in a high-paced, dynamic startup environment with a focus on rapid iteration and delivery.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e"])</script><script>self.__next_f.push([1,"19:T856,"])</script><script>self.__next_f.push([1,"\u003cp class=\"break-words white-space-pre-wrap t-black--light text-body-medium\"\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eAt AAIZEL Technologies, we are experts in the field of geospatial technologies, weather analytics and edge analytics. Our team of experts has a wealth of experience in these fields, and we are constantly seeking out new and exciting ways to apply our knowledge and skills to help our clients achieve their goals. Geospatial Technologies Our team of experts can help businesses and organisations make better decisions by visualising and analysing spatial data. We have experience in providing solutions in industries such as agriculture, energy and urban planning. Weather Analytics We have developed an AI-powered weather prediction system that can provide accurate and real-time forecasts, which can be used for a wide range of applications such as weather-sensitive industries and emergency management. Edge Analytics We can help businesses and organisations to gain insights from the data generated by their IoT devices and make better decisions with our edge analytics solutions, designed for smart city applications and IoT systems. Natural Language Processing We can help businesses and organisations to extract insights from unstructured data such as texts, and improve their customer service, chatbots, and language translation services. Computer Vision We can help businesses and organisations to extract insights from images and videos, and improve their performance in fields such as facial recognition, object recognition and image classification. Machine Learning We can help businesses and organisations to extract insights from data and improve their performance in fields such as prediction, classification, clustering and anomaly detection. Customised AI Solutions We can help businesses and organisations to develop customised AI solutions that are tailored to their specific requirements.\u003c/span\u003e\u003c/p\u003e\u003cdl class=\"overflow-hidden\"\u003e\u003cdt class=\"mb1\"\u003e\u003c/dt\u003e\u003c/dl\u003e"])</script><script>self.__next_f.push([1,"1a:T215c,"])</script><script>self.__next_f.push([1,"\u003cp data-start=\"103\" data-end=\"128\"\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cspan style=\"text-decoration: underline;\" data-mce-style=\"text-decoration: underline;\"\u003e\u003cstrong data-start=\"103\" data-end=\"128\"\u003ePlease Note:\u003c/strong\u003e\u003c/span\u003e\u003cstrong data-start=\"103\" data-end=\"128\"\u003e-\u0026nbsp;\u003c/strong\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-family: verdana, geneva, sans-serif;\" data-mce-style=\"font-family: verdana, geneva, sans-serif;\"\u003eOnly candidates from Gurugran or nearby locations are eligible.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-family: verdana, geneva, sans-serif;\" data-mce-style=\"font-family: verdana, geneva, sans-serif;\"\u003eBatch: 2025 or 2026.\u003c/span\u003e\u003cbr\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cspan style=\"text-decoration: underline;\" data-mce-style=\"text-decoration: underline;\"\u003e\u003cstrong\u003eKey Responsibilities:\u003c/strong\u003e\u003c/span\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eHelp build and maintain CI/CD pipelines to automate software build, testing, and deployment processes.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eSupport deployment and management of applications across on-premise and cloud environments (AWS).\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eMonitor system health and performance, identify issues, and assist in troubleshooting infrastructure problems.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eCollaborate with developers to improve deployment workflows and enhance overall operational efficiency.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eWork with containerization and orchestration tools like Docker and Kubernetes.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eAssist in Linux server management, configuration, and basic automation tasks.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eSupport Infrastructure as Code (IaC) initiatives using tools such as Terraform or Ansible.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eParticipate in monitoring, logging, backup, security, and disaster recovery activities.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eMaintain clear technical documentation for deployments, infrastructure setup, and operational processes.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eContinuously learn and contribute to DevOps best practices, automation strategies, and cloud-native technologies.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cspan style=\"text-decoration: underline;\" data-mce-style=\"text-decoration: underline;\"\u003e\u003cstrong\u003eRequired Skills \u0026amp; Qualifications\u003c/strong\u003e\u003c/span\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eBasic understanding of DevOps concepts and the Software Development Life Cycle (SDLC).\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eFamiliarity with CI/CD tools such as Jenkins, GitHub Actions, or similar platforms.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eBasic knowledge of cloud platforms like AWS, Microsoft Azure, or Google Cloud Platform (GCP).\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eUnderstanding of containerization and orchestration technologies such as Docker and Kubernetes.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eFamiliarity with Linux/Unix commands and basic shell scripting.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: ve rif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eParticipate in code reviews and ensure best development practices.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp data-start=\"463\" data-end=\"483\"\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cspan style=\"text-decoration: underline;\" data-mce-style=\"text-decoration: underline;\"\u003e\u003cstrong data-start=\"463\" data-end=\"483\"\u003eRequired Skills:\u003c/strong\u003e\u003c/span\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003cul data-start=\"484\" data-end=\"738\"\u003e\u003cli data-section-id=\"1y50psy\" data-start=\"484\" data-end=\"546\"\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e6-8 years of hands-on experience in C# and .NET development.\u003c/span\u003e\u003c/li\u003e\u003cli data-section-id=\"g6hpwz\" data-start=\"547\" data-end=\"616\"\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eStrong understanding of OOP concepts, REST APIs, and SQL databases.\u003c/span\u003e\u003c/li\u003e\u003cli data-section-id=\"p51u2u\" data-start=\"617\" data-end=\"689\"\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eExperience with ASP.NET MVC/.NET Core and web application development.\u003c/span\u003e\u003c/li\u003e\u003cli data-section-id=\"iz33zg\" data-start=\"690\" data-end=\"738\"\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eGood problem-solving and communication skills.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e"])</script><script>self.__next_f.push([1,"1f:T3c3a,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eHere's the content with formatting removed and a new line after every line:\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cspan style=\"text-decoration: underline;\" data-mce-style=\"text-decoration: underline;\"\u003e\u003cstrong\u003eKey Responsibilities\u003c/strong\u003e\u003c/span\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cstrong\u003eERP Implementation \u0026amp; Configuration\u003c/strong\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eLead end-to-end Odoo ERP implementation covering Inventory, Sales, Purchase, Accounting, Manufacturing, and HR modules.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eConfigure Odoo workflows, approval chains, access rights, and automated actions aligned to client business processes.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eConduct business requirement workshops, produce gap-fit analyses, and translate findings into detailed functional specifications.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003ePerform data migration from legacy systems including data cleansing, mapping, transformation, and validation.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cstrong\u003eeCommerce Development \u0026amp; Customization\u003c/strong\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eDevelop, customize, and maintain Odoo Website and eCommerce modules including storefront design, product catalog, and checkout flows.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eBuild custom Odoo modules using Python, XML, and the OWL JavaScript framework to extend standard platform capabilities.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eIntegrate Odoo with third-party platforms such as payment gateways, shipping providers, CRMs, and ERP connectors via REST/JSON-RPC APIs.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eOptimize Odoo eCommerce for performance, SEO, and mobile responsiveness in coordination with the UI/UX team.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cstrong\u003eTechnical Architecture \u0026amp; Code Quality\u003c/strong\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eDesign scalable, maintainable Odoo solutions following Odoo development best practices and atQor internal coding standards.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eConduct code reviews and provide technical mentorship to junior team members as the Odoo practice grows.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eManage Odoo.sh environments including staging, production, and automated testing pipelines.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eMaintain comprehensive technical documentation including solution design documents, API references, and deployment runbooks.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cstrong\u003eClient Delivery \u0026amp; Stakeholder Engagement\u003c/strong\u003e\u003c/em\u003e\u003c/span\u003e\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eServe as the primary Odoo technical point of contact for clients throughout the project lifecycle.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eManage post-go-live support, issue resolution, and iterative feature delivery for live Odoo environments.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eCollaborate with the Project Manager on , 70]\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eAfter rotation,\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eit becomes:\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cspan\u003e[40, 50, 60, 70, 10, 20, 30]\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eNow find:\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003etarget = 20\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eThe array doesn't look sorted anymore.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eSo...\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eCan Binary Search still work?\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eYes.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eAnd that's what surprises most beginners.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eThe Beginner Mistake\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eMany students look at the rotated array and think:\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cb\u003e\u003cstrong\u003e\"The array isn't sorted.\"\u003c/strong\u003e\u003c/b\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cb\u003e\u003cstrong\u003e\"So Binary Search is impossible.\"\u003c/strong\u003e\u003c/b\u0
